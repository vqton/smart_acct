version: "3.9"

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_acct_dev
      MYSQL_USER: dev
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: dev
      DB_PASSWORD: 123456
      DB_NAME: smart_acct_dev
      DATABASE_URL: mysql://dev:123456@db:3306/smart_acct_dev
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      HEADROOM_HOST: 0.0.0.0
      HEADROOM_PORT: 8787
      HEADROOM_TELEMETRY: "off"
    command: ["headroom", "proxy", "--host", "0.0.0.0", "--port", "8787"]

volumes:
  mariadb_data:
